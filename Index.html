<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Zero</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050505; font-family: monospace;
        }
        canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="intro-canvas"></canvas>

    <script>
        const canvas = document.getElementById('intro-canvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        let timeline = 0;
        const centerX = width / 2;
        const centerY = height / 2;
        const particles = [];
        const artFrames = [];
        
        const paintColors = ['#00f0ff', '#ff007f', '#ffd700', '#9400d3', '#ffffff'];
        let cursor = { x: centerX, y: centerY, targetX: centerX, targetY: centerY, radius: 120 };
        
        window.addEventListener('touchmove', (e) => {
            cursor.targetX = e.touches.clientX;
            cursor.targetY = e.touches.clientY;
        });

        class PaintParticle {
            constructor(x, y, isExplosion = false) {
                this.x = x; this.y = y;
                this.color = paintColors[Math.floor(Math.random() * paintColors.length)];
                if (isExplosion) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 9 + 3;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.decay = Math.random() * 0.008 + 0.004;
                } else {
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.decay = 0;
                }
                this.size = Math.random() * 3 + 1;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (timeline > 90) { this.vx *= 0.97; this.vy *= 0.97; this.alpha -= this.decay; }
                
                let dx = cursor.x - this.x;
                let dy = cursor.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < cursor.radius) {
                    let force = (cursor.radius - distance) / cursor.radius;
                    this.x += (dx / distance) * force * 3;
                    this.y += (dy / distance) * force * 3;
                }
            }
            draw() {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color; ctx.shadowColor = this.color;
                ctx.shadowBlur = timeline > 90 ? 8 : 2;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }

        class ParallaxFrame {
            constructor(index) {
                this.depth = Math.random() * 0.7 + 0.3;
                this.x = Math.random() * width;
                this.y = height + (index * 60);
                this.w = 70 * this.depth; this.h = 90 * this.depth;
                this.speed = (Math.random() * 1.5 + 1) * this.depth;
                this.alpha = 0;
                this.targetY = centerY + (Math.random() - 0.5) * 200;
                this.targetX = centerX + (Math.random() - 0.5) * 300;
            }
            update() {
                if (this.alpha < 1) this.alpha += 0.01;
                if (timeline < 280) {
                    this.y -= this.speed;
                } else {
                    this.x += (this.targetX - this.x) * 0.05;
                    this.y += (this.targetY - this.y) * 0.05;
                }
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
                ctx.strokeRect(this.x, this.y, this.w, this.h);
                ctx.restore();
            }
        }

        for(let i=0; i<30; i++) particles.push(new PaintParticle(Math.random()*width, Math.random()*height, false));

        function runCinematicEngine() {
            timeline++;
            cursor.x += (cursor.targetX - cursor.x) * 0.1;
            cursor.y += (cursor.targetY - cursor.y) * 0.1;

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            if (timeline < 90) {
                ctx.save();
                let corePulse = Math.sin(timeline * 0.1) * 2 + 4;
                ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(centerX, centerY, corePulse, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }

            if (timeline === 90) {
                for (let i = 0; i < 200; i++) particles.push(new PaintParticle(centerX, centerY, true));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            if (timeline === 180) {
                for (let i = 0; i < 8; i++) artFrames.push(new ParallaxFrame(i));
            }
            if (timeline >= 180) {
                artFrames.forEach(frame => { frame.update(); frame.draw(); });
            }

            if (timeline >= 270 && timeline <= 360) {
                let progress = (timeline - 270) / 90;
                ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, height * 0.2); ctx.lineTo(width * progress, height * 0.2);
                ctx.moveTo(width, height * 0.8); ctx.lineTo(width - (width * progress), height * 0.8);
                ctx.stroke(); ctx.restore();
            }

            if (timeline >= 360) {
                let alphaProgress = Math.min(1, (timeline - 360) / 60);
                ctx.save(); ctx.globalAlpha = alphaProgress;
                ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
                ctx.font = '24px monospace'; ctx.letterSpacing = '12px';
                ctx.fillText('STUDIO ZERO', centerX, centerY - 20);
                
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '10px monospace'; ctx.letterSpacing = '4px';
                ctx.fillText('A SANCTUARY FOR VISUAL MISFITS.', centerX, centerY + 20);
                ctx.restore();
            }

            requestAnimationFrame(runCinematicEngine);
        }

        runCinematicEngine();
    </script>
</body>
</html>
